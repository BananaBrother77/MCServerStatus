<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCServerStatus</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-wrapper">
      <section class="serverStatus">
        <!-- Header: Icon, Name, and Online Dot -->
        <div class="container">
          <div class="icon-wrapper">
            <img
              src="https://raw.githubusercontent.com/BananaBrother77/global-assets/refs/heads/main/profile.jpeg"
              alt="Server Icon"
              id="serverIconImg"
            />
          </div>
          <div class="server-info">
            <h1 id="serverName">CubeCraft</h1>
            <p id="statusText">
              <span class="status-dot" id="statusDot"></span>
              <span id="statusState">Pinging...</span>
            </p>
          </div>
        </div>

        <!-- Stats: Players and Version -->
        <div class="stats-row">
          <!-- Players Card -->
          <div class="status-card">
            <span class="card-label">Online</span>
            <span id="playersOnline" class="card-value">0</span>
            <div class="divider"></div>
            <span id="playersMax" class="card-value">0</span>
          </div>

          <!-- Version Card -->
          <div class="status-card">
            <span class="card-label">Version</span>
            <div class="divider"></div>
            <span id="serverVersion" class="card-value">1.20.1</span>
          </div>

          <!-- MOTD Card -->
          <div class="status-card motd-card">
            <span class="card-label">Message</span>
            <div class="divider"></div>
            <span id="motdText" class="card-value">Join the Darkside...</span>
          </div>
        </div>
      </section>

      <section class="server-ip-section">
        <!-- Actions: Copy IP -->
        <div class="actions">
          <div>
            <span class="card-label">Server IP:</span>
            <span class="card-value">play.cubecraft.net</span>
            <div class="divider"></div>
            <button id="copyIpBtn" class="btn-primary">
              <span id="copyBtnLabel">Copy IP</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
